name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr tests con cobertura
        env:
          MONGODB_URL: mongodb://localhost:27017/testdb
          JWT_SECRET: test-secret-key-32-characters-min
          STORAGE_BUCKET: test-bucket
          STORAGE_KEY: test-key
          STORAGE_SECRET: test-secret
          STORAGE_REGION: us-east-1
        run: |
          pytest tests/ -v --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Verificar formato
        run: |
          pip install ruff
          ruff check src/